<!DOCTYPE html>
<html>

<head>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
  <meta content="width=device-width,initial-scale=1,user-scalable=no" name="viewport">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="format-detection" content="telephone=no,address=no">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#1F2937">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  
  <!-- iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-title" content="天霸私厨">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72.png">
  <link rel="apple-touch-icon" sizes="96x96" href="/icons/icon-96.png">
  <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="384x384" href="/icons/icon-384.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
  
  <!-- Splash Screens for iOS -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <title>天霸私厨</title>
  <script><%= htmlWebpackPlugin.options.script %></script>
</head>

<body>
  <div id="app">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="lab(2.86037 0.455312 0.568903)"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="
        position: fixed;
        inset: 0;
        margin: auto;
        width: 24px;
        height: 24px;
        animation: __app-loading-spin 1s linear infinite;
      ">
      <path d="M21 12a9 9 0 1 1-6.219-8.56" />
    </svg>
    <style>
      @keyframes __app-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </div>
</body>

</html>
