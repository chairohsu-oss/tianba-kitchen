[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm build:web && pnpm build:server && mkdir -p server/public && cp -r dist-web/* server/public/"

[deploy]
startCommand = "cd server && node dist/main.js"
healthcheckPath = "/api/dishes"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
